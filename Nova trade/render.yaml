services:
  - type: web
    name: novatrade
    runtime: node
    plan: free
    buildCommand: npm install && PLAYWRIGHT_BROWSERS_PATH=$PWD/.playwright-browsers npx playwright install chromium
    startCommand: PLAYWRIGHT_BROWSERS_PATH=$PWD/.playwright-browsers node server.js
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: PRICE_SYMBOL
        value: BTCUSDT
      - key: ENABLE_REVIEW_JOB
        value: "false"

services:
  - type: web
    name: novatrade
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx playwright install chromium --with-deps
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: PRICE_SYMBOL
        value: BTCUSDT
      - key: ENABLE_REVIEW_JOB
        value: "false"
